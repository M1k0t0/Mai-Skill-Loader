# Skill Loader 配置
# 修改后使用 /skill reload 或重启 bot 生效

[plugin]
enabled = true
config_version = "1.0.0"

skills_dir = "skills"
default_model = ""           # 留空使用系统默认模型，填写 model_config.toml 中的模型 name
default_max_turns = 10       # agent 模式默认最大轮数
timeout_seconds = 60         # skill 执行超时（秒）
agent_max_context_tokens = 8000  # agent 上下文 token 预算
session_enabled = true       # 是否启用多轮会话
session_ttl_seconds = 300    # 会话过期时间（秒），超时未交互则清除
session_max_history = 20     # 会话最多保留的消息轮数（超出截断旧轮）

[capabilities]
allow_bash = true            # 允许在 sandbox 中执行 shell 命令
allow_read = true            # 允许读取 sandbox 文件
allow_write = false          # 允许写入 sandbox 文件
allow_edit = false           # 允许编辑 sandbox 文件（查找替换）
write_max_size_kb = 1024     # 写入 sandbox 文件最大 KB

bash_require_approval = true # bash 命令需要管理员审批
bash_approval_timeout = 120  # 审批等待超时（秒）

# 管理员 ID 列表，支持 "qq:123456" 或纯数字格式
# 未配置时所有 bash 命令将被拒绝
admin_ids = []

[sandbox]
endpoint_url = ""            # MCP HTTP endpoint URL，例如 http://localhost:18080/mcp
transport = "auto"           # auto, sse, streamable_http；/mcp 会自动使用 streamable_http
workdir = "/workspace"       # sandbox 内默认工作目录
skill_mount_path = "/workspace/skill" # 当前 skill 同步到 sandbox 内的路径
skill_sync_max_size_kb = 4096 # 同步单个 skill 目录最大 KB
cleanup_policy = "single_turn" # 容器自动清理策略: single_turn(单轮), session(会话), never(不自动清理)
request_timeout = 30.0       # MCP 请求超时（秒）
sse_read_timeout = 300.0     # SSE/streamable HTTP 读取超时（秒）
